<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline</title>
</head>

<body>
    <div id="root">
        <div class="container">
            <h1>📝 Timeline</h1>
            <div class="timeline" id="timeline"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="post-input" placeholder="Введите текст..." maxlength="500">
                    <div class="input-actions">
                        <button class="action-btn" id="audio-btn" title="Записать аудио">🎤</button>
                        <button class="action-btn" id="video-btn" title="Записать видео">📹</button>
                    </div>
                </div>
                <div class="recording-controls" id="recording-controls" style="display:none;">
                    <span id="recording-timer">00:00</span>
                    <button class="action-btn" id="recording-cancel">✕</button>
                    <button class="action-btn" id="recording-ok">✓</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для ввода координат вручную -->
    <div class="modal-overlay" id="coordinates-modal">
        <div class="modal">
            <h3>📍 Введите координаты вручную</h3>
            <p>Не удалось определить ваше местоположение. Пожалуйста, введите координаты в формате:</p>
            <p class="format-example">Пример: 51.50851, -0.12572</p>
            <input type="text" id="coordinates-input" placeholder="Широта, Долгота">
            <div class="error" id="coordinates-error"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="coordinates-cancel">Отмена</button>
                <button class="btn btn-primary" id="coordinates-confirm">Подтвердить</button>
            </div>
        </div>
    </div>
</body>

</html>
